name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
          targets: wasm32-unknown-unknown, thumbv7m-none-eabi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install release tools
        run: |
          rustup toolchain install nightly
          cargo install cargo-llvm-cov --locked
          cargo install cargo-fuzz --locked
          cargo install wasm-pack --locked

      - name: Validate tag matches workspace version
        run: |
          set -euo pipefail
          workspace_version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$workspace_version" != "$tag_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run full no-default-features gate
        run: cargo test --workspace --no-default-features

      - name: Compile registered examples
        run: cargo test -p animato --all-features --examples

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Check WASM integrations
        run: |
          cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom
          cargo check -p animato-leptos --target wasm32-unknown-unknown --features csr
          cargo check -p animato-dioxus --target wasm32-unknown-unknown --features web
          cargo check -p animato-yew --target wasm32-unknown-unknown --features csr
          cargo check -p animato-js --target wasm32-unknown-unknown --all-features

      - name: Check Leptos examples
        run: |
          cargo check --manifest-path examples/leptos_basic_tween/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_scroll_trigger/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_page_transition/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_animated_list/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_drag_gesture/Cargo.toml --target wasm32-unknown-unknown

      - name: Check Dioxus examples
        run: |
          cargo check --manifest-path examples/dioxus_web_tween/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/dioxus_desktop_spring/Cargo.toml
          cargo check --manifest-path examples/dioxus_cross_platform/Cargo.toml --no-default-features --features desktop
          cargo check --manifest-path examples/dioxus_tui_progress/Cargo.toml

      - name: Check Yew examples
        run: |
          cargo check --manifest-path examples/yew_basic_tween/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/yew_scroll_trigger/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/yew_animated_list/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/yew_drag_gesture/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/yew_page_transition/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/yew_agent_coordination/Cargo.toml --target wasm32-unknown-unknown

      - name: Run WASM browser tests
        run: |
          cd examples/wasm_counter
          wasm-pack test --headless --chrome

      - name: Build JavaScript package
        run: bash scripts/build-js-package.sh

      - name: Run animato-js browser tests
        run: bash scripts/wasm-pack-test-js.sh

      - name: Check JavaScript examples
        run: |
          for example in \
            examples/js_vanilla_timeline \
            examples/js_react_tween \
            examples/js_svelte_spring \
            examples/js_vue_motion \
            examples/js_angular_color
          do
            npm ci --prefix "$example"
            npm run typecheck --prefix "$example"
            npm run build --prefix "$example"
          done

      - name: Build no_std crates for bare metal
        run: |
          cargo build -p animato-core --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-tween --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-spring --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-path --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-physics --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-color --target thumbv7m-none-eabi --no-default-features

      - name: Compile benchmark suite
        run: cargo bench --workspace --no-run

      - name: Coverage gate
        run: bash scripts/coverage-core.sh

      - name: Fuzz SVG path parser
        run: cargo +nightly fuzz run svg_path_parser -- -max_total_time=60

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish_crate() {
            crate="$1"
            log="publish-${crate}.log"

            cargo publish -p "$crate" --dry-run

            set +e
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$log"
            status="${PIPESTATUS[0]}"
            set -e

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if grep -Eiq "already uploaded|already exists|crate version .* is already uploaded" "$log"; then
              echo "$crate is already published for this version; continuing explicit rerun."
              return 0
            fi

            echo "Publishing $crate failed." >&2
            exit "$status"
          }

          for crate in \
            animato-core \
            animato-color \
            animato-tween \
            animato-spring \
            animato-path \
            animato-physics \
            animato-driver \
            animato-timeline \
            animato-gpu \
            animato-wasm \
            animato-bevy \
            animato-leptos \
            animato-dioxus \
            animato-yew \
            animato-js \
            animato
          do
            publish_crate "$crate"
            if [ "$crate" != "animato" ]; then
              sleep 30
            fi
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Animato ${{ steps.version.outputs.TAG }} — JavaScript"
          body: |
            ## Animato ${{ steps.version.outputs.TAG }} — JavaScript

            Animato v1.4.0 adds `animato-js`, a Rust/WASM crate published to
            NPM as `@aarambhdevhub/animato-core`. The JavaScript package exposes tweens,
            vector tweens, keyframes, timelines, springs, path/motion helpers,
            morphing, draw values, physics, color interpolation, rAF/scroll
            drivers, DOM helpers, and batch tween evaluation while preserving
            the stable v1 Rust API.

            ### Install

            ```toml
            [dependencies]
            animato = "${{ steps.version.outputs.VERSION }}"
            ```

            ```sh
            npm install @aarambhdevhub/animato-core
            ```

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits, interpolation, and easing |
            | [`animato-color`](https://crates.io/crates/animato-color) | `${{ steps.version.outputs.VERSION }}` | Perceptual color wrappers |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>` and keyframe tracks |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | Scalar and component springs |
            | [`animato-path`](https://crates.io/crates/animato-path) | `${{ steps.version.outputs.VERSION }}` | Bezier, SVG paths, motion paths, morphing |
            | [`animato-physics`](https://crates.io/crates/animato-physics) | `${{ steps.version.outputs.VERSION }}` | Inertia, drag, and gesture recognition |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | Drivers, clocks, and scroll drivers |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | Timeline, sequence, and stagger composition |
            | [`animato-gpu`](https://crates.io/crates/animato-gpu) | `${{ steps.version.outputs.VERSION }}` | GPU/CPU fallback batch tween evaluation |
            | [`animato-wasm`](https://crates.io/crates/animato-wasm) | `${{ steps.version.outputs.VERSION }}` | rAF and DOM helpers |
            | [`animato-bevy`](https://crates.io/crates/animato-bevy) | `${{ steps.version.outputs.VERSION }}` | Bevy integration plugin |
            | [`animato-leptos`](https://crates.io/crates/animato-leptos) | `${{ steps.version.outputs.VERSION }}` | Leptos signal hooks and components |
            | [`animato-dioxus`](https://crates.io/crates/animato-dioxus) | `${{ steps.version.outputs.VERSION }}` | Dioxus signal hooks and native helpers |
            | [`animato-yew`](https://crates.io/crates/animato-yew) | `${{ steps.version.outputs.VERSION }}` | Yew hooks, components, gestures, and agents |
            | [`animato-js`](https://crates.io/crates/animato-js) | `${{ steps.version.outputs.VERSION }}` | WASM bindings published to NPM as `@aarambhdevhub/animato-core` |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Stable facade crate |

            ### NPM package

            | Package | Version | Description |
            |---------|---------|-------------|
            | [`@aarambhdevhub/animato-core`](https://www.npmjs.com/package/@aarambhdevhub/animato-core) | `${{ steps.version.outputs.VERSION }}` | JavaScript/WASM animation engine |

            ### Verification

            - `cargo fmt --check`
            - `cargo clippy --workspace --all-features -- -D warnings`
            - `cargo test --workspace --all-features`
            - `cargo test --workspace --no-default-features`
            - `cargo test -p animato --all-features --examples`
            - `cargo doc --workspace --all-features --no-deps`
            - `cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom`
            - `cargo check -p animato-leptos --target wasm32-unknown-unknown --features csr`
            - `cargo check -p animato-dioxus --target wasm32-unknown-unknown --features web`
            - `cargo check -p animato-yew --target wasm32-unknown-unknown --features csr`
            - `cargo check -p animato-js --target wasm32-unknown-unknown --all-features`
            - Leptos, Dioxus, Yew, and JavaScript example compile/build checks
            - `wasm-pack test --headless --chrome`
            - `bash scripts/build-js-package.sh`
            - `bash scripts/wasm-pack-test-js.sh`
            - `node scripts/check-js-size.mjs`
            - `cargo bench --workspace --no-run`
            - `bash scripts/coverage-core.sh`
            - `cargo +nightly fuzz run svg_path_parser -- -max_total_time=60`
            - `cargo publish --dry-run` for every crate immediately before publish

            ### Documentation

            - [README](./README.md)
            - [Full API map](./docs/api-full.md)
            - [Getting started](./docs/getting-started.md)
            - [Feature flags](./docs/feature-flags.md)
            - [Leptos integration](./docs/leptos.md)
            - [Dioxus integration](./docs/dioxus.md)
            - [Yew integration](./docs/yew.md)
            - [JavaScript integration](./docs/javascript.md)
            - [Testing](./docs/testing.md)
            - [Release process](./docs/release.md)
            - [Changelog](./CHANGELOG.md)

            ### Notes

            Capture benchmark timing on release hardware before public
            announcement and include it in follow-up release commentary when
            publishing to community channels.
          draft: false
          prerelease: false
