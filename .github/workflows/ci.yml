name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Test default features
        run: cargo test --workspace

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Test no_std crates
        run: |
          cargo test \
            -p animato-core \
            -p animato-tween \
            -p animato-spring \
            -p animato-path \
            -p animato-physics \
            -p animato-color \
            --no-default-features

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy all features
        run: cargo clippy --workspace --all-features -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  benches:
    name: Benches compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Check benches compile
        run: cargo bench --workspace --no-run

  no-std:
    name: no_std cross-compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nostd-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nostd-
            ${{ runner.os }}-cargo-

      - name: Build no_std crates
        run: |
          cargo build -p animato-core --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-tween --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-spring --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-path --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-physics --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-color --target thumbv7m-none-eabi --no-default-features

  wasm:
    name: WASM integration compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Check animato-wasm with DOM helpers
        run: cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom

      - name: Check animato-leptos CSR
        run: cargo check -p animato-leptos --target wasm32-unknown-unknown --features csr

      - name: Check animato-dioxus web
        run: cargo check -p animato-dioxus --target wasm32-unknown-unknown --features web

      - name: Check Leptos examples
        run: |
          cargo check --manifest-path examples/leptos_basic_tween/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_scroll_trigger/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_page_transition/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_animated_list/Cargo.toml --target wasm32-unknown-unknown
          cargo check --manifest-path examples/leptos_drag_gesture/Cargo.toml --target wasm32-unknown-unknown

      - name: Check Dioxus web example
        run: cargo check --manifest-path examples/dioxus_web_tween/Cargo.toml --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run wasm-pack browser tests
        run: |
          cd examples/wasm_counter
          wasm-pack test --headless --chrome

  dioxus:
    name: Dioxus integration compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dioxus-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dioxus-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Check animato-dioxus
        run: cargo check -p animato-dioxus

      - name: Check Dioxus desktop examples
        run: |
          cargo check --manifest-path examples/dioxus_desktop_spring/Cargo.toml
          cargo check --manifest-path examples/dioxus_cross_platform/Cargo.toml --no-default-features --features desktop
          cargo check --manifest-path examples/dioxus_tui_progress/Cargo.toml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage gate
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 90

  fuzz:
    name: Fuzz SVG parser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-
            ${{ runner.os }}-cargo-

      - name: Build fuzz target
        run: cargo build --manifest-path fuzz/Cargo.toml --bin svg_path_parser

  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit
